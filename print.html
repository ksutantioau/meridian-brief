<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Meridian Brief</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
@page { size: A4; margin: 0; }
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --accent: #185FA5; --accent-mid: #3a74b8; --accent-pale: #E6F1FB;
  --rule: #d4d8df; --text-primary: #1a1c1e; --text-secondary: #5a5f66; --text-tertiary: #9098a3;
  font-size: 10px;
}
body { font-family: 'Inter', system-ui, sans-serif; font-size: 1rem; background: #e8eaed; color: var(--text-primary); -webkit-print-color-adjust: exact; print-color-adjust: exact; }
@media screen { body { padding: 40px 0 80px; } .page { box-shadow: 0 8px 48px rgba(0,0,0,0.14); } }
@media print { body { background: #fff; padding: 0; } .page { box-shadow: none; } .no-print { display: none !important; } }
.page { width: 210mm; min-height: 297mm; background: #fff; margin: 0 auto; display: flex; flex-direction: column; }
.top-strip { height: 4px; background: var(--accent); flex-shrink: 0; }
.snapshot-bar { background: var(--accent); padding: 10px 36px; display: flex; align-items: center; gap: 32px; flex-shrink: 0; }
.snapshot-label { font-size: 0.68rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: rgba(255,255,255,0.6); margin-right: 8px; }
.snapshot-items { display: flex; gap: 28px; align-items: center; }
.snapshot-item { display: flex; flex-direction: column; }
.snapshot-item-val { font-size: 1.1rem; font-weight: 700; color: #fff; letter-spacing: -0.02em; line-height: 1; }
.snapshot-item-key { font-size: 0.68rem; color: rgba(255,255,255,0.55); margin-top: 2px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.6px; }
.snapshot-divider { width: 1px; height: 24px; background: rgba(255,255,255,0.2); }
.header { display: flex; align-items: flex-end; justify-content: space-between; padding: 20px 36px 16px; border-bottom: 1px solid var(--rule); flex-shrink: 0; }
.header-firm { font-size: 0.8rem; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: var(--accent); margin-bottom: 6px; }
.header-client { font-size: 2.6rem; font-weight: 300; letter-spacing: -0.03em; line-height: 1; }
.header-client strong { font-weight: 700; color: var(--accent); }
.header-sub { font-size: 0.9rem; color: var(--text-secondary); margin-top: 5px; }
.header-right { text-align: right; flex-shrink: 0; padding-left: 24px; }
.header-value { font-size: 2rem; font-weight: 700; letter-spacing: -0.02em; line-height: 1; }
.header-value-label { font-size: 0.8rem; color: var(--text-tertiary); margin-top: 4px; }
.metrics-bar { display: flex; border-bottom: 1px solid var(--rule); flex-shrink: 0; }
.metric-cell { flex: 1; padding: 12px 20px 11px; border-right: 1px solid var(--rule); text-align: center; }
.metric-cell:last-child { border-right: none; }
.metric-num { font-size: 1.8rem; font-weight: 700; color: var(--accent); letter-spacing: -0.03em; line-height: 1; }
.metric-label { font-size: 0.75rem; color: var(--text-tertiary); margin-top: 3px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.8px; }
.body { flex: 1; display: flex; min-height: 0; }
.sidebar { width: 54mm; background: #f4f5f7; border-right: 1px solid var(--rule); flex-shrink: 0; display: flex; flex-direction: column; overflow: hidden; }
.sidebar-top { padding: 18px 18px 0; display: flex; flex-direction: column; gap: 16px; }
.hero-img-wrap { flex: 1; min-height: 0; overflow: hidden; margin-top: 16px; }
.hero-img { width: 100%; height: 100%; object-fit: cover; display: block; }
.adviser-card { padding: 12px 18px 16px; border-top: 1px solid var(--rule); flex-shrink: 0; }
.main { flex: 1; padding: 20px 26px; display: flex; flex-direction: column; gap: 16px; min-width: 0; }
.section-label { font-size: 0.7rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--accent); padding-bottom: 5px; border-bottom: 1px solid var(--accent); margin-bottom: 10px; }
.sidebar-chart-img { width: 100%; display: block; }
.adviser-photo { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; display: block; margin-bottom: 7px; }
.adviser-name { font-size: 0.95rem; font-weight: 700; margin-bottom: 2px; }
.adviser-role { font-size: 0.78rem; color: var(--text-tertiary); margin-bottom: 9px; }
.adviser-signoff { font-size: 0.83rem; color: var(--text-secondary); font-style: italic; line-height: 1.5; margin-bottom: 7px; }
.adviser-disclaimer { font-size: 0.68rem; color: var(--text-tertiary); line-height: 1.4; }
.holdings-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
.holdings-table thead tr { border-bottom: 2px solid var(--accent); }
.holdings-table thead th { font-size: 0.68rem; font-weight: 600; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.8px; padding: 5px 8px 6px; text-align: left; }
.holdings-table tbody tr { border-bottom: 1px solid var(--rule); }
.holdings-table tbody tr:nth-child(even) { background: var(--accent-pale); }
.holdings-table tbody td { padding: 5px 8px; line-height: 1.3; }
.holdings-table tbody td:first-child { font-weight: 600; }
.positive { color: #2a6a3f; font-weight: 600; }
.negative { color: #8b2020; font-weight: 600; }
.context-row { display: flex; gap: 9px; }
.context-card { flex: 1; padding: 9px 10px; background: var(--accent-pale); border-top: 2px solid var(--accent-mid); }
.context-card-title { font-size: 0.68rem; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 5px; }
.context-card-body { font-size: 0.78rem; color: var(--text-secondary); line-height: 1.5; }
.commentary-text { font-size: 0.88rem; line-height: 1.75; }
.action-box { background: #f0f1f3; border-left: 3px solid #c8ccd2; padding: 12px 14px; }
.action-list { list-style: none; }
.action-list li { font-size: 0.86rem; padding: 5px 0 5px 16px; position: relative; border-bottom: 1px solid rgba(0,0,0,0.07); line-height: 1.4; color: var(--text-primary); }
.action-list li:last-child { border-bottom: none; }
.action-list li::before { content: '–'; position: absolute; left: 0; color: var(--text-tertiary); font-weight: 700; }
.bottom-strip { height: 3px; background: var(--accent); flex-shrink: 0; opacity: 0.4; }
.controls { position: fixed; top: 18px; right: 18px; display: flex; gap: 8px; z-index: 999; }
.btn { font-family: 'Inter', system-ui, sans-serif; font-size: 12px; font-weight: 600; padding: 9px 20px; border: none; border-radius: 5px; cursor: pointer; }
.btn-primary { background: var(--accent); color: #fff; }
.btn-secondary { background: #fff; color: var(--text-primary); border: 1px solid var(--rule); }
</style>
</head>
<body>

<div class="controls no-print">
  <button class="btn btn-secondary" onclick="window.close()">← Back</button>
  <button class="btn btn-primary" onclick="window.print()">Save as PDF</button>
</div>

<div class="page">
  <div class="top-strip"></div>

  <div class="snapshot-bar">
    <span class="snapshot-label">Portfolio Snapshot</span>
    <div class="snapshot-items">
      <div class="snapshot-item"><div class="snapshot-item-val" id="snap-value"></div><div class="snapshot-item-key">Total Value</div></div>
      <div class="snapshot-divider"></div>
      <div class="snapshot-item"><div class="snapshot-item-val" id="snap-mtd"></div><div class="snapshot-item-key">MTD</div></div>
      <div class="snapshot-divider"></div>
      <div class="snapshot-item"><div class="snapshot-item-val" id="snap-ytd"></div><div class="snapshot-item-key">YTD</div></div>
      <div class="snapshot-divider"></div>
      <div class="snapshot-item"><div class="snapshot-item-val" id="snap-alpha"></div><div class="snapshot-item-key" id="snap-bench-label"></div></div>
      <div class="snapshot-divider"></div>
      <div class="snapshot-item"><div class="snapshot-item-val" id="snap-risk"></div><div class="snapshot-item-key">Risk Profile</div></div>
      <div class="snapshot-divider"></div>
      <div class="snapshot-item"><div class="snapshot-item-val" id="snap-inception"></div><div class="snapshot-item-key">Since Inception</div></div>
    </div>
  </div>

  <div class="header">
    <div>
      <div class="header-firm" id="brief-eyebrow"></div>
      <div class="header-client"><span id="client-name-plain"></span> <strong id="client-name-bold"></strong></div>
      <div class="header-sub" id="header-sub"></div>
    </div>
    <div class="header-right">
      <div class="header-value" id="portfolio-value"></div>
      <div class="header-value-label">Total portfolio value (AUD)</div>
    </div>
  </div>

  <div class="metrics-bar">
    <div class="metric-cell"><div class="metric-num" id="mtd-val"></div><div class="metric-label">MTD Return</div></div>
    <div class="metric-cell"><div class="metric-num" id="ytd-val"></div><div class="metric-label">YTD Return</div></div>
    <div class="metric-cell"><div class="metric-num" id="alpha-val"></div><div class="metric-label" id="bench-label"></div></div>
  </div>

  <div class="body">
    <div class="sidebar">
      <div class="sidebar-top">
        <div>
          <div class="section-label">Allocation</div>
          <img class="sidebar-chart-img" id="donut-img" src="" alt="Allocation">
        </div>
      </div>
      <div class="hero-img-wrap">
        <img class="hero-img" id="hero-img" src="" alt="">
      </div>
      <div class="adviser-card">
        <img class="adviser-photo" id="adviser-photo" src="" alt="">
        <div class="adviser-name" id="adviser-name"></div>
        <div class="adviser-role" id="adviser-role"></div>
        <div class="adviser-signoff" id="adviser-signoff"></div>
        <div class="adviser-disclaimer">For informational purposes only. Not financial advice.</div>
      </div>
    </div>

    <div class="main">
      <div>
        <div class="section-label" id="line-label">12-Month Performance</div>
        <img id="line-img" src="" alt="Performance" style="width:100%;display:block;">
      </div>
      <div>
        <div class="section-label">Holdings</div>
        <table class="holdings-table">
          <thead><tr><th>Holding</th><th>Type</th><th>Weight</th><th>MTD</th><th>Sector</th></tr></thead>
          <tbody id="holdings-body"></tbody>
        </table>
      </div>
      <div>
        <div class="section-label">Market Context</div>
        <div class="context-row" id="context-row"></div>
      </div>
      <div>
        <div class="section-label">Outlook &amp; Commentary</div>
        <p class="commentary-text" id="commentary-text"></p>
      </div>
      <div>
        <div class="section-label">Action Items</div>
        <div class="action-box">
          <ul class="action-list" id="action-list"></ul>
        </div>
      </div>
    </div>
  </div>
  <div class="bottom-strip"></div>
</div>

window.addEventListener('message', function(e) {
  if (!e.data || e.data.type !== 'MERIDIAN_BRIEF') return;
  populate(e.data.payload);
});

window.addEventListener('DOMContentLoaded', function() {
  var hash = window.location.hash.slice(1);
  if (hash) { try { populate(JSON.parse(atob(hash))); } catch(e) {} }
});

function populate(d) {
  var root = document.documentElement;
  root.style.setProperty('--accent', d.accent);
  root.style.setProperty('--accent-mid', d.accentMid || d.accent);
  root.style.setProperty('--accent-pale', d.accentPale || '#eef1f6');

  // Snapshot bar
  setText('snap-value', d.portfolioValue);
  setText('snap-mtd', d.mtd);
  setText('snap-ytd', d.ytd);
  setText('snap-alpha', d.alpha);
  setText('snap-bench-label', 'vs ' + d.benchName);
  setText('snap-risk', d.riskProfile || '—');
  setText('snap-inception', d.inception || '—');

  // Header
  setText('brief-eyebrow', 'Meridian Wealth · ' + d.briefTitle);
  var parts = d.clientName.trim().split(' ');
  var last = parts.pop();
  setText('client-name-plain', parts.join(' '));
  setText('client-name-bold', last);
  setText('header-sub', 'Prepared by ' + d.adviserName + ' · ' + d.month);
  setText('portfolio-value', d.portfolioValue);

  // Metrics
  setText('mtd-val', d.mtd);
  setText('ytd-val', d.ytd);
  setText('alpha-val', d.alpha);
  setText('bench-label', 'vs ' + d.benchName);

  // Hero image
  var heroSrc = d.heroImg || (d.persona && HERO_IMAGES[d.persona]) || '';
  setImg('hero-img', heroSrc);

  // Charts
  setImg('donut-img', d.donutSrc);
  setText('line-label', d.lineTitle || '12-Month Performance');
  setImg('line-img', d.lineSrc);

  // Adviser
  setImg('adviser-photo', d.avatarSrc);
  setText('adviser-name', d.adviserName);
  setText('adviser-role', d.adviserRole + ' · Meridian Wealth');
  setText('adviser-signoff', d.signoff);

  // Holdings
  var tbody = document.getElementById('holdings-body');
  if (tbody) {
    tbody.innerHTML = d.holdings.map(function(h) {
      var cls = h[3] && h[3].startsWith('+') ? 'positive' : (h[3] && h[3].startsWith('-') ? 'negative' : '');
      return '<tr><td>' + h[0] + '</td><td>' + h[1] + '</td><td>' + h[2] + '</td><td class="' + cls + '">' + h[3] + '</td><td>' + h[4] + '</td></tr>';
    }).join('');
  }

  // Context cards
  var ctx = document.getElementById('context-row');
  if (ctx) {
    ctx.innerHTML = d.marketBoxes.map(function(b) {
      return '<div class="context-card"><div class="context-card-title">' + b.l + '</div><div class="context-card-body">' + b.t + '</div></div>';
    }).join('');
  }

  // Commentary & actions
  setText('commentary-text', d.narrative);
  var ul = document.getElementById('action-list');
  if (ul) ul.innerHTML = d.actions.map(function(a) { return '<li>' + a + '</li>'; }).join('');

  document.title = d.adviserName.split(' ')[0] + '_' + d.clientName.replace(/\s+/g,'_') + '_' + (d.month||'').replace(/\s+/g,'') + '_Brief';
}

function setText(id, val) { var el = document.getElementById(id); if (el && val !== undefined) el.textContent = val; }
function setImg(id, src) { var el = document.getElementById(id); if (el && src) el.src = src; }
</script>
</body>
